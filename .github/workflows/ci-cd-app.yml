name: bnd-test CI-CD App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias backend
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt

      - name: Ejecutar pruebas backend
        run: pytest
        working-directory: backend

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias frontend
        run: npm install
        working-directory: frontend

      - name: Ejecutar pruebas frontend
        run: npm test
        working-directory: frontend

  deploy-ec2:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalizar credenciales AWS
        id: aws_cred
        shell: bash
        env:
          AWS_ACCESS_KEY_ID_RAW: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY_RAW: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN_RAW: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_REGION_RAW: ${{ secrets.AWS_REGION }}
        run: |
          limpiar() {
            local valor="$1"
            valor="$(printf '%s' "$valor" | tr -d '\r\n')"
            valor="$(printf '%s' "$valor" | sed -e 's/^\"//' -e 's/\"$//')"
            echo -n "$valor"
          }

          ACCESS_KEY_ID="$(limpiar "$AWS_ACCESS_KEY_ID_RAW")"
          SECRET_ACCESS_KEY="$(limpiar "$AWS_SECRET_ACCESS_KEY_RAW")"
          SESSION_TOKEN="$(limpiar "$AWS_SESSION_TOKEN_RAW")"
          AWS_REGION="$(limpiar "$AWS_REGION_RAW")"

          if [[ -z "$ACCESS_KEY_ID" || -z "$SECRET_ACCESS_KEY" || -z "$AWS_REGION" ]]; then
            echo "Faltan secrets AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY o AWS_REGION" >&2
            exit 1
          fi

          if [[ "$ACCESS_KEY_ID" == ASIA* && -z "$SESSION_TOKEN" ]]; then
            echo "Credencial temporal detectada (ASIA) sin AWS_SESSION_TOKEN" >&2
            exit 1
          fi

          if [[ "$ACCESS_KEY_ID" == AKIA* ]]; then
            # Clave permanente: ignora token para evitar token invalido.
            SESSION_TOKEN=""
          fi

          echo "::add-mask::$ACCESS_KEY_ID"
          echo "::add-mask::$SECRET_ACCESS_KEY"
          if [[ -n "$SESSION_TOKEN" ]]; then
            echo "::add-mask::$SESSION_TOKEN"
          fi

          echo "access_key=$ACCESS_KEY_ID" >> "$GITHUB_OUTPUT"
          echo "secret_key=$SECRET_ACCESS_KEY" >> "$GITHUB_OUTPUT"
          echo "session_token=$SESSION_TOKEN" >> "$GITHUB_OUTPUT"
          echo "region=$AWS_REGION" >> "$GITHUB_OUTPUT"
          if [[ -n "$SESSION_TOKEN" ]]; then
            echo "usa_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "usa_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configurar AWS (credenciales temporales)
        if: steps.aws_cred.outputs.usa_token == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ steps.aws_cred.outputs.access_key }}
          aws-secret-access-key: ${{ steps.aws_cred.outputs.secret_key }}
          aws-session-token: ${{ steps.aws_cred.outputs.session_token }}
          aws-region: ${{ steps.aws_cred.outputs.region }}

      - name: Configurar AWS (credenciales permanentes)
        if: steps.aws_cred.outputs.usa_token == 'false'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ steps.aws_cred.outputs.access_key }}
          aws-secret-access-key: ${{ steps.aws_cred.outputs.secret_key }}
          aws-region: ${{ steps.aws_cred.outputs.region }}

      - name: Validar identidad AWS
        run: aws sts get-caller-identity

      - name: Desplegar backend en EC2
        env:
          INSTANCIA_BACKEND: ${{ secrets.BND_TEST_BACKEND_INSTANCE_ID }}
          DEPLOY_GITHUB_TOKEN: ${{ secrets.DEPLOY_GITHUB_TOKEN }}
          BACKEND_DATABASE_URL: ${{ secrets.BACKEND_DATABASE_URL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          cat > backend-commands.json <<EOF_BACKEND
          {
            "commands": [
              "set -euo pipefail",
              "dnf install -y git python3",
              "python3 -m ensurepip --upgrade || true",
              "python3 -m venv /opt/bnd-test/venv",
              "rm -rf /opt/bnd-test/backend-repo /opt/bnd-test/backend",
              "git clone 'https://x-access-token:${DEPLOY_GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git' /opt/bnd-test/backend-repo",
              "cd /opt/bnd-test/backend-repo && git checkout ${GITHUB_SHA}",
              "cp -r /opt/bnd-test/backend-repo/backend /opt/bnd-test/backend",
              "/opt/bnd-test/venv/bin/pip install --upgrade pip",
              "/opt/bnd-test/venv/bin/pip install -r /opt/bnd-test/backend/requirements.txt",
              "echo 'DATABASE_URL=${BACKEND_DATABASE_URL}' > /etc/bnd-test-backend.env",
              "chown ec2-user:ec2-user /etc/bnd-test-backend.env",
              "systemctl daemon-reload",
              "systemctl restart bnd-test-backend.service"
            ]
          }
          EOF_BACKEND

          COMANDO_ID=$(aws ssm send-command \
            --instance-ids "${INSTANCIA_BACKEND}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy backend" \
            --parameters file://backend-commands.json \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed --command-id "${COMANDO_ID}" --instance-id "${INSTANCIA_BACKEND}"
          aws ssm get-command-invocation --command-id "${COMANDO_ID}" --instance-id "${INSTANCIA_BACKEND}" --output text

      - name: Desplegar frontend en EC2
        env:
          INSTANCIA_FRONTEND: ${{ secrets.BND_TEST_FRONTEND_INSTANCE_ID }}
          DEPLOY_GITHUB_TOKEN: ${{ secrets.DEPLOY_GITHUB_TOKEN }}
          FRONTEND_API_URL: ${{ secrets.FRONTEND_API_URL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          cat > frontend-commands.json <<EOF_FRONTEND
          {
            "commands": [
              "set -euo pipefail",
              "dnf install -y git nodejs npm nginx",
              "rm -rf /opt/bnd-test/frontend-repo",
              "git clone 'https://x-access-token:${DEPLOY_GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git' /opt/bnd-test/frontend-repo",
              "cd /opt/bnd-test/frontend-repo && git checkout ${GITHUB_SHA}",
              "cd /opt/bnd-test/frontend-repo/frontend && npm install",
              "cd /opt/bnd-test/frontend-repo/frontend && VITE_API_URL='${FRONTEND_API_URL}' npm run build",
              "rm -rf /usr/share/nginx/html/*",
              "cp -r /opt/bnd-test/frontend-repo/frontend/dist/* /usr/share/nginx/html/",
              "systemctl enable nginx",
              "systemctl restart nginx"
            ]
          }
          EOF_FRONTEND

          COMANDO_ID=$(aws ssm send-command \
            --instance-ids "${INSTANCIA_FRONTEND}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy frontend" \
            --parameters file://frontend-commands.json \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed --command-id "${COMANDO_ID}" --instance-id "${INSTANCIA_FRONTEND}"
          aws ssm get-command-invocation --command-id "${COMANDO_ID}" --instance-id "${INSTANCIA_FRONTEND}" --output text
