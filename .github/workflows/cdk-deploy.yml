name: bnd-test CDK Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - ".github/workflows/cdk-deploy.yml"

permissions:
  contents: read

jobs:
  deploy-infra:
    env:
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configurar AWS (credenciales temporales)
        if: env.AWS_SESSION_TOKEN != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Configurar AWS (credenciales permanentes)
        if: env.AWS_SESSION_TOKEN == ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Validar identidad AWS
        run: aws sts get-caller-identity

      - name: Instalar dependencias CDK
        run: |
          npm install -g aws-cdk
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        working-directory: infra

      - name: Synth CDK
        run: cdk synth
        working-directory: infra

      - name: Deploy CDK
        env:
          BND_TEST_KEY_NAME: ${{ secrets.BND_TEST_KEY_NAME }}
          BND_TEST_EC2_ROLE_ARN: ${{ secrets.BND_TEST_EC2_ROLE_ARN }}
          BND_TEST_VPC_CIDR: ${{ secrets.BND_TEST_VPC_CIDR }}
          BND_TEST_MAX_AZS: ${{ secrets.BND_TEST_MAX_AZS }}
          BND_TEST_NAT_GATEWAYS: ${{ secrets.BND_TEST_NAT_GATEWAYS }}
        run: |
          cdk deploy --require-approval never \
            -c prefijo=bnd-test- \
            -c crearVpc=true \
            -c vpcCidr="${BND_TEST_VPC_CIDR:-10.50.0.0/16}" \
            -c maxAzs="${BND_TEST_MAX_AZS:-2}" \
            -c natGateways="${BND_TEST_NAT_GATEWAYS:-0}" \
            -c keyName="${BND_TEST_KEY_NAME}" \
            -c ec2RoleArn="${BND_TEST_EC2_ROLE_ARN}"
        working-directory: infra
